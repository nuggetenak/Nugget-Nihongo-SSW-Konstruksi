name: CI — Lint · Test · Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (zero warnings)
        run: npm run lint
      - name: Tests
        run: npm test -- --run
      - name: Build
        run: npm run build
